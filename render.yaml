services:
  - type: web
    name: aw-client-portal
    runtime: python
    rootDir: app
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile -
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_PATH
        value: /tmp/portal.db
      - key: SECRET_KEY
        generateValue: true
